<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍜 เชฟครัวไทย — วางแผนวัตถุดิบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────── */
    :root {
      --bg:       #FFF8F0;
      --card:     #FFFFFF;
      --primary:  #D94F1E;
      --primary2: #F07C3A;
      --gold:     #F5A623;
      --teal:     #2BBFA4;
      --green:    #27AE60;
      --red:      #E53935;
      --red-bg:   #FFEBEE;
      --red-bdr:  #FFCDD2;
      --text:     #2C1810;
      --muted:    #8D6E63;
      --border:   #F0DDD5;
      --shadow:   0 4px 20px rgba(210,80,30,.12);
      --radius:   16px;
      --radius-sm:10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      background: linear-gradient(135deg, #C0392B 0%, #D94F1E 45%, #F5A623 100%);
      padding: 28px 20px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 30%, rgba(255,255,255,.06) 0%, transparent 40%);
    }
    header::after {
      content: '🌶️ 🧄 🥥 🌿 🍋 🫚 🌶️ 🧄 🥥 🌿 🍋 🫚';
      position: absolute; bottom: 4px; left: 0; right: 0;
      font-size: 22px; letter-spacing: 6px; opacity: .35;
      white-space: nowrap; overflow: hidden;
      animation: scroll-emoji 18s linear infinite;
    }
    @keyframes scroll-emoji {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .header-icon { font-size: 56px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    header h1 {
      font-size: 28px; font-weight: 800; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.25); margin-top: 4px;
    }
    header p { color: rgba(255,255,255,.88); font-size: 15px; margin-top: 6px; font-weight: 500; }
    .header-stats {
      display: flex; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap;
    }
    .header-stat {
      background: rgba(255,255,255,.22); border-radius: 20px;
      padding: 5px 14px; font-size: 13px; color: #fff; font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .wave-bottom { height: 40px; overflow: hidden; }
    .wave-bottom svg { display: block; fill: var(--bg); }

    /* ── LAYOUT ─────────────────────────────── */
    .app-wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── SECTION HEADER ─────────────────────── */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin: 28px 0 14px;
    }
    .section-header .icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .section-header h2 { font-size: 18px; font-weight: 700; }

    /* ── SEARCH & FILTER ────────────────────── */
    .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .search-box {
      flex: 1; min-width: 180px;
      border: 2px solid var(--border); border-radius: 12px;
      padding: 10px 14px 10px 38px; font-size: 15px; font-family: inherit;
      background: var(--card) url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238D6E63' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E") no-repeat 12px center;
      outline: none; color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus { border-color: var(--primary2); box-shadow: 0 0 0 3px rgba(240,124,58,.15); }
    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 7px 14px; border-radius: 20px; border: 2px solid var(--border);
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
      background: var(--card); color: var(--muted);
      transition: all .18s; white-space: nowrap;
    }
    .pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .pill:hover:not(.active) { border-color: var(--primary2); color: var(--primary2); }

    /* ── MENU GRID ──────────────────────────── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .menu-card {
      background: var(--card); border-radius: var(--radius-sm);
      border: 2px solid var(--border); padding: 12px 10px;
      cursor: pointer; text-align: center;
      transition: all .18s; position: relative;
      user-select: none;
    }
    .menu-card:hover { border-color: var(--primary2); transform: translateY(-2px); box-shadow: var(--shadow); }
    .menu-card.selected {
      background: linear-gradient(135deg, #FFF0E8, #FFF8E1);
      border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary), var(--shadow);
    }
    .menu-card .check {
      position: absolute; top: 6px; right: 6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--primary); display: none;
      align-items: center; justify-content: center;
      font-size: 11px; color: #fff;
    }
    .menu-card.selected .check { display: flex; }
    .menu-card .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
    .menu-card .name { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .menu-card.hidden { display: none; }

    /* selection count bar */
    .selection-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 2px solid var(--border);
      border-radius: 12px; padding: 10px 16px; margin-bottom: 16px;
    }
    .selection-bar .count { font-size: 14px; font-weight: 600; color: var(--muted); }
    .selection-bar .count b { color: var(--primary); font-size: 17px; }
    .btn-clear {
      padding: 6px 14px; border-radius: 8px; border: none;
      background: var(--border); color: var(--muted); font-size: 13px;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .btn-clear:hover { background: var(--red); color: #fff; }

    /* ── RESULTS LAYOUT ─────────────────────── */
    .results-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 8px;
    }
    @media (max-width: 700px) { .results-wrap { grid-template-columns: 1fr; } }

    .results-panel {
      background: var(--card); border-radius: var(--radius);
      border: 2px solid var(--border); overflow: hidden;
    }
    .results-panel .panel-head {
      padding: 14px 18px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid var(--border);
    }
    .results-panel .panel-head h3 { font-size: 16px; font-weight: 700; flex: 1; }
    .badge {
      padding: 3px 9px; border-radius: 10px; font-size: 12px; font-weight: 700;
    }
    .badge-primary { background: var(--primary); color: #fff; }
    .badge-teal    { background: var(--teal); color: #fff; }
    .badge-red     { background: var(--red); color: #fff; }

    /* ── INGREDIENT LIST ────────────────────── */
    .ing-list { padding: 12px; max-height: 600px; overflow-y: auto; }
    .ing-group { margin-bottom: 12px; }
    .ing-group-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px;
      padding: 0 6px 6px;
    }

    .ing-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; border-radius: 10px; margin-bottom: 4px;
      border: 1.5px solid transparent;
      transition: all .15s;
    }
    .ing-item:hover { background: #FFF5EE; }
    .ing-item.shared {
      background: var(--red-bg);
      border-color: var(--red-bdr);
    }
    .ing-item.done { opacity: .45; }
    .ing-item.done .ing-name { text-decoration: line-through; }

    /* checkbox */
    .ing-check {
      flex-shrink: 0; width: 20px; height: 20px;
      border-radius: 6px; border: 2px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin-top: 1px; transition: all .15s; background: #fff;
    }
    .ing-check:hover { border-color: var(--primary2); }
    .ing-check.checked { background: var(--green); border-color: var(--green); }
    .ing-check.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }

    .ing-body { flex: 1; min-width: 0; }
    .ing-row1 { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .ing-name { font-size: 14px; font-weight: 600; }
    .ing-amount {
      font-size: 13px; font-weight: 700; color: var(--primary);
      white-space: nowrap;
    }
    .ing-unit { font-size: 12px; color: var(--muted); }

    /* shared tag */
    .shared-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700; border-radius: 6px;
      padding: 1px 6px; margin-left: 4px; vertical-align: middle;
    }
    /* menu name tag (single-menu items) */
    .ing-menu-tag {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 4px;
      font-size: 11px; color: #666;
      background: #F3F3F0; border-radius: 20px;
      padding: 2px 8px; line-height: 1.5;
      max-width: 100%; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* breakdown per menu */
    .ing-breakdown {
      margin-top: 5px; padding: 6px 8px;
      background: rgba(229,57,53,.07); border-radius: 8px;
      border-left: 3px solid var(--red);
    }
    .ing-breakdown-row {
      font-size: 12px; color: var(--text); line-height: 1.7;
    }
    .ing-breakdown-row .menu-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: var(--primary2); margin-right: 5px;
    }
    .ing-breakdown-row .amount-b { font-weight: 700; color: var(--primary); }

    /* copy button */
    .btn-copy {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--card); color: var(--muted);
      font-size: 13px; font-family: inherit; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-copy:hover { background: var(--teal); border-color: var(--teal); color: #fff; }
    .btn-copy.copied { background: var(--green); border-color: var(--green); color: #fff; }

    /* sync indicator */
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); display: inline-block; margin-left: 4px;
      animation: pulse-dot 2s infinite;
    }
    .sync-dot.offline { background: var(--muted); animation: none; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(1.4); }
    }

    /* empty state */
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .empty-state .e-icon { font-size: 44px; display: block; margin-bottom: 10px; opacity: .55; }
    .empty-state p { font-size: 14px; }

    /* ── STEPS TEXT PANEL ──────────────────────── */
    .steps-list { padding: 10px; max-height: 600px; overflow-y: auto; }

    .steps-card { margin-bottom: 16px; border-radius: 14px; overflow: hidden;
      border: 2px solid var(--border); background: var(--card);
      box-shadow: 0 2px 12px rgba(210,80,30,.08); }

    .steps-card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: linear-gradient(135deg, #FFF0E8 0%, #FFF8E1 100%);
      border-bottom: 2px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .steps-card-head .menu-label {
      font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px;
    }
    .steps-card-head .toggle-icon { font-size: 13px; color: var(--muted); transition: transform .2s; }
    .steps-card-head.collapsed .toggle-icon { transform: rotate(-90deg); }

    .steps-body { overflow: hidden; transition: max-height .3s ease; }
    .steps-body.collapsed { max-height: 0 !important; }

    .steps-ol { list-style: none; margin: 0; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .step-item {
      display: flex; gap: 12px; align-items: flex-start;
      background: #FAFAF8; border-radius: 10px; padding: 10px 12px;
      border-left: 4px solid var(--primary);
    }
    .step-num {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    .step-text {
      font-size: 14px; line-height: 1.65; color: #333; flex: 1;
    }

    /* Bullet tips (lines starting with •) */
    .step-item.tip { border-left-color: var(--teal); background: #F0FBF9; }
    .step-item.tip .step-num { background: var(--teal); }

    /* Sub-recipe divider inside steps */
    .step-sub-header {
      display: flex; align-items: center; gap: 8px;
      margin: 8px 0 4px;
      font-size: 13px; font-weight: 700; color: var(--teal);
      padding: 8px 14px;
      background: linear-gradient(135deg, #E8F8F5 0%, #F0FBF9 100%);
      border-left: 4px solid var(--teal);
      border-radius: 8px;
    }
    .step-sub-header::before { content: "🌶️"; font-size: 15px; }

    /* ── SCROLLBAR ──────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary2); }

    /* ── TOAST ──────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #2C1810; color: #fff; padding: 11px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600; z-index: 9999; white-space: nowrap;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; display: flex; align-items: center; gap: 8px;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── RESPONSIVE TWEAKS ──────────────────── */
    @media (max-width: 480px) {
      .menu-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────── -->
<header>
  <span class="header-icon">🍜</span>
  <h1>เชฟครัวไทย</h1>
  <p>เลือกเมนู → ดูวัตถุดิบรวม + วิธีทำ</p>
  <div class="header-stats">
    <span class="header-stat" id="stat-recipes">⏳ กำลังโหลด...</span>
    <span class="header-stat" id="stat-ing">📦 วัตถุดิบ —</span>
  </div>
</header>
<div class="wave-bottom">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" height="40" width="100%">
    <path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z"/>
  </svg>
</div>

<div class="app-wrap">

  <!-- ── MENU SELECTOR ─────────────────────── -->
  <div class="section-header">
    <div class="icon" style="background:#FFF0E8">🍽️</div>
    <h2>เลือกเมนูที่จะทำ</h2>
  </div>

  <div class="toolbar">
    <input class="search-box" type="text" id="search" placeholder="ค้นหาเมนู..." autocomplete="off">
    <div class="filter-pills" id="filters">
      <button class="pill active" data-cat="all">ทั้งหมด</button>
      <button class="pill" data-cat="ข้าว">ข้าว</button>
      <button class="pill" data-cat="แกง">แกง/ต้ม</button>
      <button class="pill" data-cat="ผัด">ผัด</button>
      <button class="pill" data-cat="ยำ">ยำ/ลาบ</button>
      <button class="pill" data-cat="ปลา">ปลา</button>
      <button class="pill" data-cat="น้ำพริก">น้ำพริก</button>
      <button class="pill" data-cat="ของหวาน">ของหวาน</button>
      <button class="pill" data-cat="อื่นๆ">อื่นๆ</button>
    </div>
  </div>

  <div class="selection-bar">
    <span class="count">เลือกแล้ว <b id="sel-count">0</b> เมนู</span>
    <button class="btn-clear" id="btn-clear">ล้างทั้งหมด</button>
  </div>

  <div class="menu-grid" id="menu-grid"></div>

  <!-- ── RESULTS ──────────────────────────── -->
  <div class="section-header" id="results-header" style="display:none">
    <div class="icon" style="background:#FFF0E8">📋</div>
    <h2>สรุปวัตถุดิบ + วิธีทำ</h2>
  </div>

  <div class="results-wrap" id="results-wrap" style="display:none">

    <!-- Ingredients panel -->
    <div class="results-panel">
      <div class="panel-head">
        <span style="font-size:20px">🛒</span>
        <h3>วัตถุดิบที่ต้องเตรียม</h3>
        <span class="badge badge-primary" id="ing-count">0</span>
        <button class="btn-copy" id="btn-copy" title="คัดลอกรายการวัตถุดิบ">
          <span id="btn-copy-icon">📋</span> คัดลอก
        </button>
        <span class="sync-dot" id="sync-dot" title="Real-time sync"></span>
      </div>
      <div class="ing-list" id="ing-list">
        <div class="empty-state">
          <span class="e-icon">🛒</span>
          <p>เลือกเมนูก่อนนะคะ</p>
        </div>
      </div>
    </div>

    <!-- Steps panel -->
    <div class="results-panel">
      <div class="panel-head">
        <span style="font-size:20px">👨‍🍳</span>
        <h3>วิธีทำ &amp; เคล็ดลับ</h3>
        <span class="badge badge-teal" id="steps-count">0</span>
      </div>
      <div class="steps-list" id="steps-list">
        <div class="empty-state">
          <span class="e-icon">👨‍🍳</span>
          <p>เลือกเมนูเพื่อดูวิธีทำ</p>
        </div>
      </div>
    </div>

  </div>
</div><!-- /app-wrap -->

<!-- ── TOAST ─────────────────────────────────── -->
<div id="toast">✅ <span id="toast-msg"></span></div>

<script>
// ────────────────────────────────────────────────
// Config & State
// ────────────────────────────────────────────────
const DATA_URL = 'recipes_v2.json';
let recipes = {};       // name → recipe object
let selected = new Set(); // selected menu names
let checked  = {};      // ingredientKey → boolean (checked off)

// ── Category classification ──
function classify(name) {
  const n = name;
  if (/ข้าวเหนียว|ข้าวต้มมัด|ขนมครก|ทับทิม/.test(n)) return 'ของหวาน';
  if (/ข้าว/.test(n)) return 'ข้าว';
  if (/แกง|ต้ม|โป๊ะแตก|ฮังเล/.test(n)) return 'แกง';
  if (/ผัด|คั่ว/.test(n)) return 'ผัด';
  if (/ยำ|ลาบ|ส้มตำ/.test(n)) return 'ยำ';
  if (/ปลา|ห่อหมก/.test(n)) return 'ปลา';
  if (/น้ำพริก|หลน/.test(n)) return 'น้ำพริก';
  return 'อื่นๆ';
}

// ── Menu emoji mapping ──
function menuEmoji(name) {
  if (/ข้าว/.test(name))        return '🍚';
  if (/แกงเขียว/.test(name))   return '🍛';
  if (/แกง/.test(name))         return '🥘';
  if (/ต้มยำ|ต้มข่า/.test(name)) return '🍲';
  if (/ผัดไทย/.test(name))     return '🍜';
  if (/ผัดกะเพรา/.test(name))  return '🌿';
  if (/ผัด/.test(name))         return '🥗';
  if (/ยำ/.test(name))          return '🥙';
  if (/ลาบ/.test(name))         return '🌶️';
  if (/ส้มตำ/.test(name))      return '🧡';
  if (/ปลา/.test(name))         return '🐟';
  if (/ไก่/.test(name))         return '🐓';
  if (/หมู/.test(name))         return '🥩';
  if (/กุ้ง/.test(name))        return '🦐';
  if (/เป็ด/.test(name))        return '🦆';
  if (/ไข่/.test(name))         return '🥚';
  if (/น้ำพริก/.test(name))    return '🌶️';
  if (/หลน/.test(name))         return '🥣';
  if (/ขนม|ทับทิม|ข้าวเหนียวมะม่วง/.test(name)) return '🍮';
  if (/เปาะเปี้ยะ|กระทง|ทอดมัน|สะเต๊ะ|ช่อม่วง/.test(name)) return '🥟';
  return '🍽️';
}

// ────────────────────────────────────────────────
// Real-time sync via BroadcastChannel
// ────────────────────────────────────────────────
let bc;
try {
  bc = new BroadcastChannel('thai-cooking-sync');
  bc.onmessage = (e) => {
    if (e.data?.type === 'check-update') {
      checked = { ...checked, ...e.data.payload };
      renderIngredients();
    }
  };
} catch(e) { bc = null; }

function broadcastCheck(key, val) {
  if (bc) bc.postMessage({ type: 'check-update', payload: { [key]: val } });
  if (wsSync) {
    try { wsSync.send(JSON.stringify({ type: 'check-update', payload: { [key]: val } })); }
    catch(e) {}
  }
}

// WebSocket hook for future domain connection
let wsSync = null;
window.connectSync = function(wsUrl) {
  try {
    wsSync = new WebSocket(wsUrl);
    wsSync.onopen  = () => { showToast('🔗 เชื่อมต่อ real-time แล้ว'); setSyncDot(true); };
    wsSync.onclose = () => { setSyncDot(false); };
    wsSync.onerror = () => { setSyncDot(false); };
    wsSync.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'check-update') {
          checked = { ...checked, ...d.payload };
          renderIngredients();
        }
      } catch(err) {}
    };
  } catch(e) { console.warn('connectSync failed:', e); }
};

function setSyncDot(online) {
  const dot = document.getElementById('sync-dot');
  dot.classList.toggle('offline', !online);
  dot.title = online ? 'เชื่อมต่อ real-time' : 'Local sync (BroadcastChannel)';
}

// ────────────────────────────────────────────────
// Copy ingredient list as plain-text checklist
// ────────────────────────────────────────────────
function buildCopyText() {
  if (selected.size === 0) return '';

  const menuList = [...selected].join(' + ');
  const now = new Date().toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
  let lines = [];
  lines.push(`🛒 รายการวัตถุดิบ — ${menuList}`);
  lines.push(`📅 ${now}`);
  lines.push('─'.repeat(36));

  const map = buildIngredients();
  const shared = Object.entries(map).filter(([,v]) => v.menus.length >= 2);
  const single = Object.entries(map).filter(([,v]) => v.menus.length === 1);

  if (shared.length > 0) {
    lines.push('');
    lines.push(`🔴 วัตถุดิบร่วม (${shared.length} รายการ)`);
    for (const [k, v] of shared) {
      const isDone = !!checked[k];
      const box = isDone ? '[x]' : '[ ]';
      const amounts = v.menus.map(m => m.amount);
      const totalStr = formatSum(amounts, v.unit);
      lines.push(`${box} ${v.name} — ${totalStr}`);
      // Per-menu breakdown as sub-notes
      for (const m of v.menus) {
        lines.push(`      · ${m.menuName}: ${m.amount} ${v.unit}`);
      }
    }
  }

  if (single.length > 0) {
    lines.push('');
    lines.push(`วัตถุดิบอื่นๆ (${single.length} รายการ)`);
    for (const [k, v] of single) {
      const isDone = !!checked[k];
      const box = isDone ? '[x]' : '[ ]';
      lines.push(`${box} ${v.name} — ${displayAmount(v.menus[0].amount)} ${v.unit}`);
    }
  }

  lines.push('');
  lines.push(`✅ ที่ติ๊กแล้ว: ${Object.values(checked).filter(Boolean).length} รายการ`);
  return lines.join('\n');
}

document.getElementById('btn-copy').addEventListener('click', async () => {
  const text = buildCopyText();
  if (!text) { showToast('⚠️ ยังไม่ได้เลือกเมนู'); return; }

  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('btn-copy');
    const icon = document.getElementById('btn-copy-icon');
    btn.classList.add('copied');
    icon.textContent = '✅';
    btn.querySelector('span + text, :last-child') && (btn.lastChild.textContent = ' คัดลอกแล้ว!');
    // Inline text update
    btn.innerHTML = '✅ คัดลอกแล้ว!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span id="btn-copy-icon">📋</span> คัดลอก';
    }, 2000);
    showToast('📋 คัดลอกรายการแล้ว — วางในแอปโน้ตได้เลย!');
  } catch(e) {
    // Fallback: prompt with text
    prompt('คัดลอกรายการวัตถุดิบ:', text);
  }
});

// ────────────────────────────────────────────────
// Amount helpers — keep fractions as-is
// ────────────────────────────────────────────────
function parseAmount(s) {
  if (!s) return null;
  s = s.toString().trim();
  // Unicode fractions
  const fmap = { '½': 0.5, '¼': 0.25, '¾': 0.75, '⅓': 1/3, '⅔': 2/3 };
  if (fmap[s] !== undefined) return fmap[s];
  // Mixed like "1½"
  for (const [f, v] of Object.entries(fmap)) {
    if (s.startsWith(f)) return v + parseFloat(s.slice(f.length)||0);
    if (s.endsWith(f))   return parseFloat(s.slice(0,-1)||0) + v;
  }
  // Slash fraction "1/4"
  if (s.includes('/')) {
    const [a,b] = s.split('/');
    return parseFloat(a) / parseFloat(b);
  }
  return parseFloat(s) || null;
}

function displayAmount(s) {
  // Return as-is — no decimal conversion
  return s ? s.toString().trim() : '';
}

function sumAmounts(arr) {
  // Try to sum numeric amounts; return null if any can't be parsed
  let total = 0;
  for (const a of arr) {
    const v = parseAmount(a);
    if (v === null) return null;
    total += v;
  }
  return total;
}

function formatSum(amounts, unit) {
  const total = sumAmounts(amounts);
  if (total === null) {
    // Can't sum — just join
    return amounts.join(' + ') + ' ' + unit;
  }
  // Format: if integer, show as integer; else up to 2 decimal places
  const disp = Number.isInteger(total) ? total : parseFloat(total.toFixed(2));
  return disp + ' ' + unit;
}

// ────────────────────────────────────────────────
// Ingredient key (for deduplication & sync)
// ────────────────────────────────────────────────
function ingKey(name, unit) {
  return (name + '|' + unit).toLowerCase().replace(/\s+/g, '');
}

// ────────────────────────────────────────────────
// Build combined ingredient list
// ────────────────────────────────────────────────
function buildIngredients() {
  // Map: ingKey → { name, unit, menus: [{menuName, amount}] }
  const map = {};

  function addIng(ing, label) {
    const k = ingKey(ing.name, ing.unit);
    if (!map[k]) map[k] = { name: ing.name, unit: ing.unit, menus: [] };
    // Merge if same label already exists (main + sub_recipe of same menu)
    const existing = map[k].menus.find(m => m.menuName === label);
    const amt = displayAmount(ing.amount || '');
    if (existing) {
      if (amt && existing.amount) existing.amount += ' + ' + amt;
      else if (amt) existing.amount = amt;
    } else {
      map[k].menus.push({ menuName: label, amount: amt });
    }
  }

  for (const menuName of selected) {
    const recipe = recipes[menuName];
    if (!recipe) continue;
    // Main ingredients
    for (const ing of recipe.ingredients || []) addIng(ing, menuName);
    // Sub-recipe (curry paste) ingredients — same menu label
    const sr = recipe.sub_recipe;
    if (sr && sr.ingredients) {
      for (const ing of sr.ingredients) addIng(ing, menuName);
    }
  }
  return map;
}

// ────────────────────────────────────────────────
// Render: Ingredients list
// ────────────────────────────────────────────────
function renderIngredients() {
  const container = document.getElementById('ing-list');
  const countBadge = document.getElementById('ing-count');

  if (selected.size === 0) {
    container.innerHTML = `<div class="empty-state"><span class="e-icon">🛒</span><p>เลือกเมนูก่อนนะคะ</p></div>`;
    countBadge.textContent = '0';
    return;
  }

  const map = buildIngredients();
  const items = Object.entries(map);
  const shared = items.filter(([,v]) => v.menus.length >= 2);
  const single = items.filter(([,v]) => v.menus.length === 1);

  countBadge.textContent = items.length;
  document.getElementById('ing-count').textContent = items.length;

  let html = '';

  if (shared.length > 0) {
    html += `<div class="ing-group">
      <div class="ing-group-label" style="color:var(--red)">🔴 วัตถุดิบร่วม (${shared.length} รายการ)</div>`;
    for (const [k, v] of shared) {
      html += renderIngItem(k, v, true);
    }
    html += '</div>';
  }

  if (single.length > 0) {
    html += `<div class="ing-group">
      <div class="ing-group-label">วัตถุดิบอื่นๆ (${single.length} รายการ)</div>`;
    for (const [k, v] of single) {
      html += renderIngItem(k, v, false);
    }
    html += '</div>';
  }

  container.innerHTML = html;

  // Bind checkboxes
  container.querySelectorAll('.ing-check').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      checked[key] = !checked[key];
      broadcastCheck(key, checked[key]);
      el.classList.toggle('checked', !!checked[key]);
      el.closest('.ing-item').classList.toggle('done', !!checked[key]);
    });
    // Init state
    if (checked[el.dataset.key]) {
      el.classList.add('checked');
      el.closest('.ing-item').classList.add('done');
    }
  });
}

function renderIngItem(k, v, isShared) {
  const isDone = !!checked[k];
  const doneClass = isDone ? ' done' : '';
  const sharedClass = isShared ? ' shared' : '';
  const checkedClass = isDone ? ' checked' : '';

  // Amount display
  let amountHtml = '';
  if (isShared) {
    // Show total + per-menu breakdown
    const amounts = v.menus.map(m => m.amount);
    const totalStr = formatSum(amounts, v.unit);
    amountHtml = `<span class="ing-amount">${totalStr}</span>
      <span class="shared-tag">🔴 ${v.menus.length} เมนู</span>`;
  } else {
    amountHtml = `<span class="ing-amount">${displayAmount(v.menus[0].amount)}</span>
      <span class="ing-unit">${v.unit}</span>`;
  }

  // Menu name tag (single-menu) or per-menu breakdown (shared)
  let breakdownHtml = '';
  if (!isShared) {
    const menuName = v.menus[0].menuName;
    breakdownHtml = `<div><span class="ing-menu-tag">${menuEmoji(menuName)} ${escHtml(menuName)}</span></div>`;
  } else if (isShared) {
    const rows = v.menus.map(m =>
      `<div class="ing-breakdown-row">
        <span class="menu-dot"></span>
        ${escHtml(m.menuName)}:
        <span class="amount-b">${escHtml(m.amount)} ${escHtml(v.unit)}</span>
      </div>`
    ).join('');
    breakdownHtml = `<div class="ing-breakdown">${rows}</div>`;
  }

  return `<div class="ing-item${sharedClass}${doneClass}" data-key="${escAttr(k)}">
    <div class="ing-check${checkedClass}" data-key="${escAttr(k)}"></div>
    <div class="ing-body">
      <div class="ing-row1">
        <span class="ing-name">${escHtml(v.name)}</span>
        ${amountHtml}
      </div>
      ${breakdownHtml}
    </div>
  </div>`;
}

// ────────────────────────────────────────────────
// Render: Cooking Steps (Text)
// ────────────────────────────────────────────────
function renderSteps() {
  const container  = document.getElementById('steps-list');
  const countBadge = document.getElementById('steps-count');

  if (selected.size === 0) {
    container.innerHTML = `<div class="empty-state"><span class="e-icon">👨‍🍳</span><p>เลือกเมนูเพื่อดูวิธีทำ</p></div>`;
    countBadge.textContent = '0';
    return;
  }

  let html  = '';
  let count = 0;

  for (const menuName of selected) {
    const recipe = recipes[menuName];
    if (!recipe) continue;
    const steps = recipe.steps || [];
    if (!steps.length) continue;
    count++;

    const cardId = 'sc_' + count;

    // Helper: build numbered step items
    function buildStepItems(stepList) {
      let html = '';
      let num = 0;
      for (const stepText of stepList) {
        const text = stepText.trim();
        if (!text) continue;
        const numMatch = text.match(/^(\d+)\.\s*([\s\S]+)/);
        if (numMatch) {
          num++;
          const body = escHtml(numMatch[2] || '').replace(/\n/g, '<br>');
          html += `<li class="step-item"><div class="step-num">${num}</div><div class="step-text">${body}</div></li>`;
        } else {
          const body = escHtml(text).replace(/\n/g, '<br>');
          html += `<li class="step-item tip"><div class="step-num">💡</div><div class="step-text">${body}</div></li>`;
        }
      }
      return html;
    }

    // Main recipe steps
    let stepsHtml = buildStepItems(steps);

    // Sub-recipe (curry paste) section
    const sr = recipe.sub_recipe;
    if (sr && sr.steps && sr.steps.length > 0) {
      const srName = escHtml(sr.name || 'วิธีทำพริกแกง');
      stepsHtml += `<li style="list-style:none"><div class="step-sub-header">${srName}</div></li>`;
      stepsHtml += buildStepItems(sr.steps);
    }

    const totalSteps = steps.length + (sr && sr.steps ? sr.steps.length : 0);
    const bodyHeight = totalSteps * 80 + 200;
    html += `
    <div class="steps-card">
      <div class="steps-card-head" data-wrap="${cardId}">
        <div class="menu-label">
          <span>${menuEmoji(menuName)}</span>
          <span>${escHtml(menuName)}</span>
        </div>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="steps-body" id="${cardId}" style="max-height:${bodyHeight}px">
        <ol class="steps-ol">${stepsHtml}</ol>
      </div>
    </div>`;
  }

  if (!html) {
    container.innerHTML = `<div class="empty-state"><span class="e-icon">📖</span><p>ไม่พบวิธีทำสำหรับเมนูที่เลือก</p></div>`;
  } else {
    container.innerHTML = html;

    // Collapse toggle
    container.querySelectorAll('.steps-card-head').forEach(head => {
      head.addEventListener('click', () => {
        const wrap = document.getElementById(head.dataset.wrap);
        const col  = wrap.classList.toggle('collapsed');
        head.classList.toggle('collapsed', col);
      });
    });
  }

  countBadge.textContent = count;
}

document.addEventListener('DOMContentLoaded', () => {
});

// ────────────────────────────────────────────────
// Render: Menu Grid
// ────────────────────────────────────────────────
function renderMenuGrid() {
  const grid = document.getElementById('menu-grid');
  const names = Object.keys(recipes);
  grid.innerHTML = names.map(name => {
    const cat = classify(name);
    const emoji = menuEmoji(name);
    return `<div class="menu-card" data-name="${escAttr(name)}" data-cat="${escAttr(cat)}">
      <div class="check">✓</div>
      <span class="emoji">${emoji}</span>
      <div class="name">${escHtml(name)}</div>
    </div>`;
  }).join('');

  // Click handler
  grid.addEventListener('click', e => {
    const card = e.target.closest('.menu-card');
    if (!card) return;
    const name = card.dataset.name;
    if (selected.has(name)) {
      selected.delete(name);
      card.classList.remove('selected');
    } else {
      selected.add(name);
      card.classList.add('selected');
    }
    updateSelectionCount();
    updateResults();
  });
}

// ────────────────────────────────────────────────
// Render: Update UI after selection change
// ────────────────────────────────────────────────
function updateResults() {
  const hasSelection = selected.size > 0;
  document.getElementById('results-header').style.display = hasSelection ? 'flex' : 'none';
  document.getElementById('results-wrap').style.display  = hasSelection ? 'grid' : 'none';
  renderIngredients();
  renderSteps();
}

function updateSelectionCount() {
  document.getElementById('sel-count').textContent = selected.size;
}

// ────────────────────────────────────────────────
// Filter & Search
// ────────────────────────────────────────────────
let activeFilter = 'all';

document.getElementById('filters').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  activeFilter = pill.dataset.cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p === pill));
  applyFilter();
});

document.getElementById('search').addEventListener('input', applyFilter);

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('.menu-card').forEach(card => {
    const name = card.dataset.name;
    const cat  = card.dataset.cat;
    const matchCat = activeFilter === 'all' || cat === activeFilter;
    const matchQ   = !q || name.includes(q);
    card.classList.toggle('hidden', !(matchCat && matchQ));
  });
}

// Clear selection
document.getElementById('btn-clear').addEventListener('click', () => {
  selected.clear();
  document.querySelectorAll('.menu-card.selected').forEach(c => c.classList.remove('selected'));
  updateSelectionCount();
  updateResults();
  showToast('🗑️ ล้างรายการแล้ว');
});

// ────────────────────────────────────────────────
// Toast notification
// ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ────────────────────────────────────────────────
// Utility
// ────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return escHtml(s); }

// ────────────────────────────────────────────────
// Bootstrap
// ────────────────────────────────────────────────
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    recipes = data;
    const totalIng = Object.values(recipes).reduce((s,r)=>s+(r.ingredients||[]).length,0);
    document.getElementById('stat-recipes').textContent = `🍽️ ${Object.keys(recipes).length} เมนู`;
    document.getElementById('stat-ing').textContent     = `📦 ${totalIng} วัตถุดิบ`;
    renderMenuGrid();
    showToast('✅ โหลดข้อมูลสำเร็จ!');
  })
  .catch(err => {
    document.getElementById('stat-recipes').textContent = '❌ โหลดข้อมูลไม่ได้';
    console.error('Failed to load recipes:', err);
  });
